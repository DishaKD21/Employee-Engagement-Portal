services:
  backend:
    build: ./server
    container_name: employee-portal-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: employee-portal-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend